<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ QuickChat</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;font-family:Arial;height:100vh;display:flex;justify-content:center;align-items:center}
        .phone{width:100%;max-width:400px;height:100vh;background:#0a0a1a;display:flex;flex-direction:column}
        .header{background:#16213e;padding:15px;color:white;text-align:center;font-weight:bold;font-size:18px;border-bottom:2px solid #ff4444}
        .header span{color:#ff4444}
        .messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px}
        .msg{max-width:80%;padding:10px 15px;border-radius:15px;color:white;font-size:14px;word-break:break-word}
        .msg.sent{background:#ff4444;align-self:flex-end}
        .msg.received{background:#16213e;align-self:flex-start}
        .msg .sender{font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:3px}
        .msg .time{font-size:10px;color:rgba(255,255,255,0.4);text-align:right;margin-top:5px}
        .input-area{display:flex;padding:10px;gap:10px;background:#16213e}
        .input-area input{flex:1;padding:12px;border-radius:25px;border:none;background:#0a0a1a;color:white;font-size:14px;outline:none}
        .input-area button{width:45px;height:45px;border-radius:50%;border:none;background:#ff4444;color:white;font-size:20px;cursor:pointer}
        .login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:100;display:flex;align-items:center;justify-content:center}
        .login-box{background:#16213e;padding:30px;border-radius:20px;text-align:center;color:white;width:90%;max-width:350px}
        .login-box h2{color:#ff4444;margin-bottom:10px}
        .login-box input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ff4444;background:#0a0a1a;color:white;font-size:14px;text-align:center;outline:none}
        .login-box button{width:100%;padding:12px;background:#ff4444;color:white;border:none;border-radius:10px;font-weight:bold;font-size:16px;cursor:pointer;margin-top:10px}
        .admin-panel{display:none;padding:10px;background:#0a0a1a;border-top:1px solid #ff4444}
        .admin-panel h3{color:#ff4444;font-size:14px;margin-bottom:10px}
        .admin-panel input{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:1px solid #333;background:#16213e;color:white;font-size:12px}
        .admin-panel button{padding:8px 15px;background:#ff4444;color:white;border:none;border-radius:5px;cursor:pointer;font-size:12px;margin:3px}
        .error{color:#ff4444;font-size:12px;display:none;margin-top:5px}
    </style>
</head>
<body>

<div class="phone" id="app">
    <div class="header">⚡ <span>QuickChat</span></div>
    <div class="messages" id="messagesContainer"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">➤</button>
    </div>
    <div class="admin-panel" id="adminPanel">
        <h3>👑 Админ-панель</h3>
        <input type="text" id="newUserNick" placeholder="Никнейм друга">
        <input type="text" id="newUserCode" placeholder="Код появится здесь" readonly>
        <button onclick="generateCode()">🎫 Создать код</button>
        <button onclick="logout()">🚪 Выйти</button>
    </div>
</div>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>⚡ QuickChat</h2>
        <p style="color:#ccc;font-size:13px;margin-bottom:15px;">Введи код чтобы войти</p>
        <input type="text" id="codeInput" placeholder="Код">
        <button onclick="login()">✅ Войти</button>
        <div class="error" id="loginError">❌ Неверный код!</div>
    </div>
</div>

<script>
const firebaseConfig = {
    databaseURL: "https://quickchat-c8bc2-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;
const ADMIN_KEY = "danil_admin_2025";

function login(){
    let code = document.getElementById('codeInput').value.trim();
    if(code === ADMIN_KEY){
        currentUser = 'admin';
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        return;
    }
    db.ref('codes/' + code).once('value').then(snap => {
        if(snap.val()){
            currentUser = snap.val();
            document.getElementById('loginOverlay').style.display = 'none';
            loadMessages();
        }else{
            document.getElementById('loginError').style.display = 'block';
            setTimeout(() => document.getElementById('loginError').style.display = 'none', 2000);
        }
    });
}

function generateCode(){
    let nick = document.getElementById('newUserNick').value.trim();
    if(!nick) return alert('Введи ник!');
    let code = Math.floor(1000 + Math.random() * 9000).toString();
    db.ref('codes/' + code).set(nick);
    document.getElementById('newUserCode').value = code;
}

function sendMessage(){
    let text = document.getElementById('messageInput').value.trim();
    if(!text || !currentUser) return;
    db.ref('messages').push({
        text: text,
        sender: currentUser === 'admin' ? '👑 Шеф' : '@' + currentUser,
        time: new Date().toLocaleTimeString(),
        timestamp: Date.now()
    });
    document.getElementById('messageInput').value = '';
}

function loadMessages(){
    db.ref('messages').on('value', snap => {
        let c = document.getElementById('messagesContainer');
        c.innerHTML = '';
        let msgs = snap.val() || {};
        Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp).forEach(m => {
            let d = document.createElement('div');
            let isMine = (m.sender === '👑 Шеф' && currentUser === 'admin') || m.sender === ('@' + currentUser);
            d.className = 'msg ' + (isMine ? 'sent' : 'received');
            d.innerHTML = (isMine ? '' : '<div class="sender">' + m.sender + '</div>') + m.text + '<div class="time">' + m.time + '</div>';
            c.appendChild(d);
        });
        c.scrollTop = c.scrollHeight;
    });
}

function logout(){
    currentUser = null;
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('codeInput').value = '';
}
</script>
</body>
</html>
